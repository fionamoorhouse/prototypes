<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiona's Prototypes</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #F5F4F0;
      height: 100vh;
      display: flex;
      overflow: hidden;
      color: #1A1A1A;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 260px;
      flex-shrink: 0;
      background: #FFFFFF;
      border-right: 1px solid #E5E2DB;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 28px 0 32px;
    }

    .sidebar-header {
      padding: 0 20px 24px;
      border-bottom: 1px solid #E5E2DB;
    }
    .sidebar-name {
      font-size: 16px;
      font-weight: 700;
      color: #1A1A1A;
      letter-spacing: -0.2px;
    }
    .sidebar-role {
      font-size: 12px;
      color: #999;
      margin-top: 3px;
    }

    .sidebar-section {
      padding: 20px 20px 6px;
    }
    .sidebar-section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #bbb;
      margin-bottom: 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 2px;
      transition: background 0.12s;
    }
    .nav-item:hover { background: #F5F4F0; }
    .nav-item.active { background: #EFE9DE; }

    .nav-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      flex-shrink: 0;
    }
    .nav-label {
      font-size: 14px;
      font-weight: 500;
      color: #555;
      line-height: 1.3;
    }
    .nav-item.active .nav-label { color: #1A1A1A; font-weight: 600; }

    /* ── Main panel ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      height: 100vh;
    }

    .detail-header {
      flex-shrink: 0;
      background: #fff;
      border-bottom: 1px solid #E5E2DB;
      padding: 20px 32px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .detail-header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
    }
    .detail-header-left { flex: 1; }

    .detail-tag {
      display: inline-flex;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      border-radius: 6px;
      padding: 3px 8px;
      margin-bottom: 8px;
    }

    .detail-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.4px;
    }
    .detail-summary {
      font-size: 13px;
      color: #555;
      line-height: 1.6;
      width: 100%;
    }
    .detail-brief-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 10px;
      font-size: 12px;
      font-weight: 600;
      color: #067A46;
      text-decoration: none;
    }
    .detail-brief-link:hover { text-decoration: underline; }

    .detail-meta {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }
    .meta-item {
      font-size: 11px;
      color: #999;
    }
    .meta-item span {
      font-weight: 600;
      color: #555;
    }

    /* ── Prototype iframe ── */
    .proto-wrap {
      flex: 1;
      overflow: hidden;
      background: #2B2B2B;
      position: relative;
    }
    .proto-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── Empty state ── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #999;
    }
    .empty-state-icon { font-size: 40px; opacity: 0.3; }
    .empty-state p { font-size: 14px; }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-name">Fiona Lucas</div>
      <div class="sidebar-role">Principal PM, Deliveries &amp; Orders</div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-label">Deliveries</div>
      <div class="nav-item active" onclick="load('cadency')" id="nav-cadency">
        <div class="nav-dot" style="background:#96DC14;"></div>
        <div class="nav-label">Cadency</div>
      </div>
      <div class="nav-item" onclick="load('address')" id="nav-address">
        <div class="nav-dot" style="background:#7B8CDE;"></div>
        <div class="nav-label">Flexible Address Management</div>
      </div>
      <div class="nav-item" onclick="load('ultimate-unpause')" id="nav-ultimate-unpause">
        <div class="nav-dot" style="background:#1F8A5B;"></div>
        <div class="nav-label">Ultimate Unpause</div>
      </div>
      <div class="nav-item" onclick="load('flex-dashboard')" id="nav-flex-dashboard">
        <div class="nav-dot" style="background:#BBF06A;"></div>
        <div class="nav-label">Flex Dashboard</div>
      </div>
      <div class="nav-item" onclick="load('deliveries-mobile')" id="nav-deliveries-mobile">
        <div class="nav-dot" style="background:#F4A261;"></div>
        <div class="nav-label">Deliveries Mobile</div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-label">Orders</div>
      <div class="nav-item" onclick="load('giftcard-purchase')" id="nav-giftcard-purchase">
        <div class="nav-dot" style="background:#E8A838;"></div>
        <div class="nav-label">Gift Card - Purchase</div>
      </div>
      <div class="nav-item" onclick="load('giftcard-redeem')" id="nav-giftcard-redeem">
        <div class="nav-dot" style="background:#E8A838;"></div>
        <div class="nav-label">Gift Card - Redeem</div>
      </div>
    </div>
  </nav>

  <!-- Main panel -->
  <div class="main" id="main">

    <!-- Header - swapped by JS -->
    <div class="detail-header" id="detail-header">
      <div class="detail-header-top">
        <div class="detail-header-left">
          <div class="detail-tag" id="detail-tag"></div>
          <div class="detail-title" id="detail-title"></div>
        </div>
        <div class="detail-meta" id="detail-meta"></div>
      </div>
      <div class="detail-summary" id="detail-summary"></div>
      <a class="detail-brief-link" id="detail-brief-link" href="#" target="_blank">
        &#8599; View brief
      </a>
    </div>

    <!-- Iframe -->
    <div class="proto-wrap">
      <iframe id="proto-frame" src="cadency/index.html" title="Prototype"></iframe>
    </div>

  </div>

  <script>
    const prototypes = {
      cadency: {
        tag: 'Deliveries - Q3 P1',
        tagColor: '#067A46',
        tagBg: '#DEF5DB',
        title: 'Cadency - Subscription Cadence Flexibility',
        summary: 'Allow customers to choose delivery frequency - bi-weekly or monthly - in their account settings. Currently only available in the cancellation funnel. 28% of customers already follow less-frequent patterns by manually pausing, and 22% of pause survey respondents explicitly say they don\'t want weekly delivery. Business case: RTE €35M, HF €26M. This prototype covers the Plan Settings entry point, frequency picker, bi-weekly and monthly order views, and the add-extra-box drawer.',
        brief: null,
        meta: [
          { label: 'Priority', value: 'Q3 P1' },
          { label: 'Domain', value: 'Subscription Settings' },
          { label: 'KPI', value: 'Managed Order Rate' },
          { label: 'Effort', value: 'M' },
        ],
        src: 'cadency/index.html',
      },
      address: {
        tag: 'Deliveries - Q3 P0',
        tagColor: '#1A5276',
        tagBg: '#D6EAF8',
        title: 'One-off Address Change',
        summary: 'Active subscribers cannot easily redirect a single box to a temporary location - holiday home, family, workplace. The current UX only supports subscription-level address changes, with no cut-off time warnings and no order-level override. This causes delivery errors, unnecessary pauses, and avoidable CS contacts. This prototype introduces a Multi-Address Book with three entry points, letting customers choose between a one-off redirect or a permanent subscription change - with clear cut-off guardrails at every step.',
        brief: null,
        meta: [
          { label: 'Priority', value: 'Q3 P0' },
          { label: 'Domain', value: 'Delivery Management' },
          { label: 'KPI', value: 'Unpause Rate' },
          { label: 'Effort', value: 'M' },
        ],
        src: 'address-flows/index.html',
      },
      'ultimate-unpause': {
        tag: 'Deliveries - Q3',
        tagColor: '#0A6640',
        tagBg: '#D4F0E2',
        title: 'Ultimate Unpause',
        summary: 'A consolidated unpause experience that gives customers more control when reactivating their subscription. Explores a richer reactivation flow with clear next-box timing, flexible restart options, and reduced friction for customers returning after a pause.',
        brief: null,
        meta: [
          { label: 'Domain', value: 'Subscription Management' },
        ],
        src: 'ultimate-unpause/index.html',
      },
      'flex-dashboard': {
        tag: 'Deliveries - Q3',
        tagColor: '#3A6B00',
        tagBg: '#EAF5D0',
        title: 'HelloFresh Flex Dashboard',
        summary: 'A dashboard concept for the Factor Flex subscription model, giving customers visibility and control over their flexible subscription - upcoming boxes, billing, and pause/skip options in one place.',
        brief: null,
        meta: [
          { label: 'Domain', value: 'Subscription Management' },
        ],
        src: 'flex-dashboard/index.html',
      },
      'deliveries-mobile': {
        tag: 'Deliveries - Q3',
        tagColor: '#B45309',
        tagBg: '#FEF3C7',
        title: 'Deliveries Mobile',
        summary: 'Mobile prototype for the HelloFresh deliveries experience, covering upcoming delivery management, address changes, and order modifications optimised for the mobile app context.',
        brief: null,
        meta: [
          { label: 'Domain', value: 'Delivery Management' },
        ],
        src: 'deliveries-mobile/index.html',
      },
      'giftcard-purchase': {
        tag: 'Orders - Not Q3',
        tagColor: '#9A6B00',
        tagBg: '#FDF3DC',
        title: 'Gift Card - Purchase (Mobile)',
        summary: 'Extract gift card purchase and generation out of the monolith. Improve the front-end experience for gift card purchasers - cleaner flow, accessible to actives and formers, actively marketable. Enables gift card sales to be grown rather than just maintained. Dependency on the Payments team B2B gift card processor project which could also serve B2C purchase.',
        brief: null,
        meta: [
          { label: 'Priority', value: 'Not Q3' },
          { label: 'Domain', value: 'Gift Cards' },
          { label: 'KPI', value: 'OTP Orders + Gift Card Redemption Rate' },
          { label: 'Effort', value: 'M' },
        ],
        src: 'gift-card-purchase/index.html',
      },
      'giftcard-redeem': {
        tag: 'Orders - Q3 P2',
        tagColor: '#9A6B00',
        tagBg: '#FDF3DC',
        title: 'Gift Card - Redeem via OTP',
        summary: 'Shift gift card redemption out of the monolith and into the OTP checkout flow. Customers apply their gift card voucher to a one-time purchase instead of being forced into a subscription. Current redemption rate is ~60% and declining - OTP redemption should improve this significantly. Depends on "Enable OTP via Voucher" being delivered first.',
        brief: null,
        meta: [
          { label: 'Priority', value: 'Q3 P2' },
          { label: 'Domain', value: 'Gift Cards' },
          { label: 'KPI', value: 'Gift Card Redemption Rate' },
          { label: 'Effort', value: 'M' },
        ],
        src: 'gift-card-redeem/index.html',
      },
    };

    let current = null;

    function load(id) {
      if (current === id) return;
      current = id;

      // Update nav active state
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      document.getElementById('nav-' + id).classList.add('active');

      const p = prototypes[id];

      // Update header
      const tag = document.getElementById('detail-tag');
      tag.textContent = p.tag;
      tag.style.color = p.tagColor;
      tag.style.background = p.tagBg;

      document.getElementById('detail-title').textContent = p.title;
      document.getElementById('detail-summary').textContent = p.summary;

      const briefLink = document.getElementById('detail-brief-link');
      if (p.brief) {
        briefLink.href = p.brief;
        briefLink.style.display = 'inline-flex';
      } else {
        briefLink.style.display = 'none';
      }

      const meta = document.getElementById('detail-meta');
      meta.innerHTML = p.meta.map(m =>
        `<div class="meta-item">${m.label}: <span>${m.value}</span></div>`
      ).join('');

      // Load prototype
      document.getElementById('proto-frame').src = p.src;
    }

    // Load default
    load('cadency');
  </script>

</body>
</html>
