<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiona's Prototypes</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #F5F4F0;
      height: 100vh;
      display: flex;
      overflow: hidden;
      color: #1A1A1A;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 260px;
      flex-shrink: 0;
      background: #1A1A1A;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 28px 0 32px;
    }

    .sidebar-header {
      padding: 0 20px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .sidebar-name {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.2px;
    }
    .sidebar-role {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      margin-top: 2px;
    }

    .sidebar-section {
      padding: 20px 20px 6px;
    }
    .sidebar-section-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: rgba(255,255,255,0.3);
      margin-bottom: 6px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 2px;
      transition: background 0.12s;
    }
    .nav-item:hover { background: rgba(255,255,255,0.07); }
    .nav-item.active { background: rgba(255,255,255,0.12); }

    .nav-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      flex-shrink: 0;
    }
    .nav-label {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.65);
      line-height: 1.3;
    }
    .nav-item.active .nav-label { color: #fff; font-weight: 600; }

    /* ── Main panel ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      height: 100vh;
    }

    .detail-header {
      flex-shrink: 0;
      background: #fff;
      border-bottom: 1px solid #E5E2DB;
      padding: 20px 32px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
    }
    .detail-header-left { flex: 1; }

    .detail-tag {
      display: inline-flex;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      border-radius: 6px;
      padding: 3px 8px;
      margin-bottom: 8px;
    }

    .detail-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.4px;
      margin-bottom: 6px;
    }
    .detail-summary {
      font-size: 13px;
      color: #555;
      line-height: 1.6;
      max-width: 620px;
    }
    .detail-brief-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 10px;
      font-size: 12px;
      font-weight: 600;
      color: #067A46;
      text-decoration: none;
    }
    .detail-brief-link:hover { text-decoration: underline; }

    .detail-meta {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }
    .meta-item {
      font-size: 11px;
      color: #999;
    }
    .meta-item span {
      font-weight: 600;
      color: #555;
    }

    /* ── Prototype iframe ── */
    .proto-wrap {
      flex: 1;
      overflow: hidden;
      background: #2B2B2B;
      position: relative;
    }
    .proto-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── Empty state ── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #999;
    }
    .empty-state-icon { font-size: 40px; opacity: 0.3; }
    .empty-state p { font-size: 14px; }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-name">Fiona Lucas</div>
      <div class="sidebar-role">Principal PM - Consumer Core</div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-label">Deliveries</div>
      <div class="nav-item active" onclick="load('cadency')" id="nav-cadency">
        <div class="nav-dot" style="background:#96DC14;"></div>
        <div class="nav-label">Cadency</div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-label">Orders</div>
      <div class="nav-item" onclick="load('address')" id="nav-address">
        <div class="nav-dot" style="background:#7B8CDE;"></div>
        <div class="nav-label">Flexible Address Management</div>
      </div>
    </div>
  </nav>

  <!-- Main panel -->
  <div class="main" id="main">

    <!-- Header - swapped by JS -->
    <div class="detail-header" id="detail-header">
      <div class="detail-header-left">
        <div class="detail-tag" id="detail-tag"></div>
        <div class="detail-title" id="detail-title"></div>
        <div class="detail-summary" id="detail-summary"></div>
        <a class="detail-brief-link" id="detail-brief-link" href="#" target="_blank">
          &#8599; View brief
        </a>
      </div>
      <div class="detail-meta" id="detail-meta"></div>
    </div>

    <!-- Iframe -->
    <div class="proto-wrap">
      <iframe id="proto-frame" src="cadency/index.html" title="Prototype"></iframe>
    </div>

  </div>

  <script>
    const prototypes = {
      cadency: {
        tag: 'Cadency',
        tagColor: '#067A46',
        tagBg: '#DEF5DB',
        title: 'Subscription Cadence Flexibility',
        summary: 'Active subscribers lose the ability to manage frequency on their own terms — 28% already self-manage a less-frequent pattern through manual skipping, driving "subscription anxiety" and early cancellation. This prototype explores bi-weekly and monthly delivery cadences with a clean, intentional dashboard: auto-skipped weeks, one-tap unskip, and an add-extra-box flow for monthly customers.',
        brief: null,
        meta: [
          { label: 'Status', value: 'Discovery' },
          { label: 'Platform', value: 'iOS & Android' },
          { label: 'Target', value: 'W3+ subscribers' },
        ],
        src: 'cadency/index.html',
      },
      address: {
        tag: 'Flexible Address Management',
        tagColor: '#3B4FC8',
        tagBg: '#EEF0FF',
        title: 'Multi-Address Book',
        summary: 'Subscribers can\'t easily redirect a single box to a temporary location - holiday home, family, workplace. The current UX only supports subscription-level address changes, with no cut-off warnings and no order-level override, leading to delivery errors and avoidable CS contacts. This prototype introduces a Multi-Address Book with three entry points, letting customers choose between a one-off redirect or a permanent subscription change - with clear cut-off guardrails at every step.',
        brief: null,
        meta: [
          { label: 'Status', value: 'Draft' },
          { label: 'Platform', value: 'iOS & Android' },
          { label: 'Target', value: 'Q3 2026' },
        ],
        src: 'address-flows/index.html',
      },
    };

    let current = null;

    function load(id) {
      if (current === id) return;
      current = id;

      // Update nav active state
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      document.getElementById('nav-' + id).classList.add('active');

      const p = prototypes[id];

      // Update header
      const tag = document.getElementById('detail-tag');
      tag.textContent = p.tag;
      tag.style.color = p.tagColor;
      tag.style.background = p.tagBg;

      document.getElementById('detail-title').textContent = p.title;
      document.getElementById('detail-summary').textContent = p.summary;

      const briefLink = document.getElementById('detail-brief-link');
      if (p.brief) {
        briefLink.href = p.brief;
        briefLink.style.display = 'inline-flex';
      } else {
        briefLink.style.display = 'none';
      }

      const meta = document.getElementById('detail-meta');
      meta.innerHTML = p.meta.map(m =>
        `<div class="meta-item">${m.label}: <span>${m.value}</span></div>`
      ).join('');

      // Load prototype
      document.getElementById('proto-frame').src = p.src;
    }

    // Load default
    load('cadency');
  </script>

</body>
</html>
